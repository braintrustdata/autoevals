name: js

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: node ${{ matrix.node-version }} / zod ${{ matrix.zod }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # duckdb has an incredibly slow install with 24.x
        node-version: [20.x, 22.x]
        # zod is a peerDependency ("^3.25.0 || ^4.0.0"); test both majors.
        zod: ["3", "4"]

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Cache node_modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            node_modules
            !node_modules/.cache/turbo
          key: ${{ matrix.runner }}-${{ matrix.node_version }}-node-zod${{ matrix.zod }}-${{ env.nodeModulesCacheHash }}
          restore-keys: |
            ${{ matrix.runner }}-${{ matrix.node_version }}-node-zod${{ matrix.zod }}-
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.0
      - run: pnpm install --frozen-lockfile
      # The lockfile pins zod 3, so re-pin to exercise the zod 4 half of the range.
      - name: Pin zod 4
        if: matrix.zod == '4'
        run: pnpm add -D "zod@^4" --no-frozen-lockfile
      - name: Verify resolved zod major
        run: node -e "const v=require('zod/package.json').version; console.log('zod', v); if (!v.startsWith('${{ matrix.zod }}.')) { console.error('expected zod ${{ matrix.zod }}.x'); process.exit(1); }"
      - run: pnpm run test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
      - run: pnpm run build
